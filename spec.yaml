steps:
  just_cat:
    operation: map
    pool: my_cool_pool
    job_count: 100
    input_table_paths: [ "input_table1", "input_table2" ]
    output_table_paths: [ "output_table" ]
    mapper:
      command: cat
      memory_limit: 1000000;
  sort_after:
    operation: sort
    data_weight_per_partition_job: 1000000
    sort_by: [ "key", "subkey" ]
    input_table_paths: [ "output_table" ]
    output_table_paths: [ "sorted_output_table" ]