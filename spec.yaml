steps:
  just_cat:
    operation_type: map
    pool: my_cool_pool
    job_count: 100
    input_table_paths: [ "input_table" ]
    output_table_paths: [ "output_table" ]
    mapper:
      command: cat
      format: yson
  sort_after:
    input_table_paths: [ "output_table" ]
    output_table_paths: [ "sorted_output_table" ]
    operation_type: sort
    sort_by: [ "key" ]